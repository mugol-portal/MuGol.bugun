<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MuGöl Takvim - Sayaçlı & Paylaşımlı</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1880946354382681" crossorigin="anonymous"></script>
    <script async custom-element="amp-auto-ads" src="https://cdn.ampproject.org/v0/amp-auto-ads-0.1.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

    <!-- Fontlar (Sadece Nunito) -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400;1,600&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f172a;
            --glass-bg: rgba(20, 25, 40, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #94a3b8;
            
            --c-war: #f87171;      
            --c-sci: #34d399;      
            --c-art: #c084fc;      
            --c-dis: #fb923c;      
            --c-emp: #facc15;      
            --c-lit: #f472b6;      
            
            --accent: #38bdf8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        ::-webkit-scrollbar { width: 0; }

        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
                radial-gradient(at 50% 0%, hsla(225,39%,30%,1) 0, transparent 50%), 
                radial-gradient(at 100% 0%, hsla(339,49%,30%,1) 0, transparent 50%);
            background-attachment: fixed;
            background-size: 200% 200%;
            animation: aurora 20s ease infinite;
            color: var(--text-main);
            min-height: 100vh;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        @keyframes aurora { 0% {background-position:0% 50%} 50% {background-position:100% 50%} 100% {background-position:0% 50%} }

        .container { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 20px; padding-bottom: 60px; }

        /* --- LOGO --- */
        .app-header { text-align: center; margin-bottom: 5px; }
        .app-logo { 
            font-family: 'Nunito', sans-serif; font-size: 2.2rem; font-weight: 800; letter-spacing: 2px;
            background: linear-gradient(to bottom, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* --- GLASS BOX --- */
        .glass-box {
            background: var(--glass-bg);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); position: relative; overflow: hidden;
        }
        .glass-box::before {
            content:''; position:absolute; top:0; left:0; width:100%; height:1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
        }

        /* --- KONTROLLER --- */
        .cal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .month-display { 
            font-size: 1.1rem; font-weight: 700; color: white; cursor: pointer; 
            padding: 5px 15px; border-radius: 12px; transition: 0.2s;
        }
        .month-display:active { background: rgba(255,255,255,0.1); }
        .nav-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white;
            width: 36px; height: 36px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.2s;
        }
        .nav-btn:active { transform: scale(0.9); background: var(--accent); color: #000; }

        /* --- TAKVİM IZGARASI --- */
        .weekdays { display: grid; grid-template-columns: repeat(7, 1fr); text-align: center; margin-bottom: 10px; }
        .wd { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .days-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day {
            aspect-ratio: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            border-radius: 14px; font-size: 1rem; font-weight: 600; position: relative; cursor: pointer;
            background: rgba(255,255,255,0.02); border: 1px solid transparent; transition: 0.2s;
        }
        .day:hover { background: rgba(255,255,255,0.08); }
        .day.selected { 
            background: white; color: #000; font-weight: 800; 
            box-shadow: 0 0 20px rgba(255,255,255,0.3); transform: scale(1.05); z-index: 2;
        }
        .day.today { border-color: var(--accent); color: var(--accent); }
        .day.today.selected { border-color: transparent; background: var(--accent); color: #000; }
        .dots { display: flex; gap: 3px; position: absolute; bottom: 5px; }
        .dot { width: 4px; height: 4px; border-radius: 50%; }
        .dot.official { background: var(--c-war); box-shadow: 0 0 5px var(--c-war); }
        .dot.religious { background: #a855f7; box-shadow: 0 0 5px #a855f7; }

        /* --- TARİH DETAY --- */
        .date-hero { 
            display: flex; flex-direction: column; align-items: center; text-align: center;
            padding-bottom: 20px; border-bottom: 1px solid var(--glass-border); margin-bottom: 15px;
        }
        .hero-num { 
            font-family: 'Nunito', sans-serif; font-size: 5rem; font-weight: 900; line-height: 0.9; 
            background: linear-gradient(180deg, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .hero-full { font-size: 1rem; font-weight: 800; color: var(--accent); margin-top: 5px; letter-spacing: 1.5px; text-transform: uppercase; }
        
        .badges-row { display: flex; gap: 10px; margin-top: 15px; flex-wrap: wrap; justify-content: center; }
        .info-badge { font-size: 0.8rem; padding: 6px 12px; border-radius: 50px; font-weight: 700; display: flex; align-items: center; gap: 6px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .ib-hijri { background: rgba(16, 185, 129, 0.15); color: var(--c-sci); border: 1px solid rgba(16, 185, 129, 0.3); }
        .ib-count { background: rgba(250, 204, 21, 0.15); color: #fde047; border: 1px solid rgba(250, 204, 21, 0.3); }
        .ib-season { background: rgba(56, 189, 248, 0.15); color: var(--accent); border: 1px solid rgba(56, 189, 248, 0.3); }
        .ib-moon { background: rgba(167, 139, 250, 0.15); color: #e9d5ff; border: 1px solid rgba(167, 139, 250, 0.3); }

        .daily-quote {
            background: rgba(255,255,255,0.03); border-radius: 12px; padding: 15px; text-align: center;
            font-style: italic; font-size: 0.9rem; color: #cbd5e1; margin-bottom: 20px; border-left: 3px solid var(--accent);
            position: relative; font-weight: 500;
        }
        .daily-quote::before { content: '"'; font-size: 3rem; position: absolute; opacity: 0.1; top: -5px; left: 10px; font-family: 'Nunito', sans-serif; font-style: normal; }

        /* --- OLAY KARTLARI VE FİLTRELER --- */
        .section-title { 
            font-size: 0.85rem; text-transform: uppercase; color: var(--text-muted); margin-bottom: 10px; 
            font-weight: 800; letter-spacing: 1px; display: flex; align-items: center; justify-content: space-between;
        }

        .filter-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; }
        .filter-btn {
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: var(--text-muted);
            padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; cursor: pointer; white-space: nowrap; transition: 0.3s;
        }
        .filter-btn.active { background: var(--text-main); color: var(--bg-dark); border-color: var(--text-main); }
        
        .events-list { max-height: 600px; overflow-y: auto; padding-right: 5px; scroll-behavior: smooth; }

        .event-card {
            position: relative; padding: 18px; margin-bottom: 15px; border-radius: 18px;
            overflow: hidden; transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
            border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.02);
            opacity: 0; animation: cardEntry 0.5s ease forwards;
        }
        @keyframes cardEntry { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        .event-card:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.3); background: rgba(255,255,255,0.05); }
        .event-card::before {
            content: ''; position: absolute; right: -10px; bottom: -15px;
            font-family: "Font Awesome 6 Free"; font-weight: 900;
            font-size: 5rem; opacity: 0.08; transform: rotate(-20deg); pointer-events: none; transition: 0.3s;
        }
        .event-card:hover::before { opacity: 0.15; transform: rotate(-10deg) scale(1.1); }

        .ec-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; position: relative; z-index: 1;}
        .ec-title-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .ec-year { font-family: 'Nunito', sans-serif; font-weight: 900; font-size: 1.4rem; }
        .ec-tag { font-size: 0.65rem; font-weight: 800; padding: 3px 8px; border-radius: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
        .ec-text { font-size: 0.95rem; font-weight: 500; line-height: 1.5; color: rgba(255,255,255,0.9); position: relative; z-index: 1; }
        
        .share-btn {
            background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; width: 32px; height: 32px;
            border-radius: 50%; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center;
        }
        .share-btn:hover { background: var(--accent); color: #000; transform: scale(1.1); border-color: transparent; }

        /* OLAY SEÇİM KUTUSU */
        .custom-checkbox {
            appearance: none; -webkit-appearance: none;
            width: 22px; height: 22px; margin: 0;
            border: 2px solid rgba(255,255,255,0.3); border-radius: 6px;
            background: rgba(0,0,0,0.2); cursor: pointer;
            position: relative; transition: 0.2s; display: none; align-items: center; justify-content: center;
        }
        .custom-checkbox:checked { background: var(--accent); border-color: var(--accent); }
        .custom-checkbox:checked::after {
            content: '\f00c'; font-family: 'Font Awesome 6 Free'; font-weight: 900;
            color: #000; font-size: 12px; position: absolute;
        }

        .selection-mode .custom-checkbox { display: flex; }
        .selection-mode .share-btn { display: none; }

        /* -- UI TEMALAR -- */
        .theme-war { border-left: 4px solid var(--c-war); }
        .theme-war::before { content: '\f6cc'; color: var(--c-war); }
        .theme-war .ec-year { color: #fca5a5; } .theme-war .ec-tag { background: rgba(248,113,113,0.2); color: #fca5a5; border: 1px solid rgba(248,113,113,0.3); }

        .theme-sci { border-left: 4px solid var(--c-sci); }
        .theme-sci::before { content: '\f5d2'; color: var(--c-sci); }
        .theme-sci .ec-year { color: #6ee7b7; } .theme-sci .ec-tag { background: rgba(52,211,153,0.2); color: #6ee7b7; border: 1px solid rgba(52,211,153,0.3); }

        .theme-lit { border-left: 4px solid var(--c-lit); }
        .theme-lit::before { content: '\f518'; color: var(--c-lit); }
        .theme-lit .ec-year { color: #fbcfe8; } .theme-lit .ec-tag { background: rgba(244,114,182,0.2); color: #fbcfe8; border: 1px solid rgba(244,114,182,0.3); }

        .theme-art { border-left: 4px solid var(--c-art); }
        .theme-art::before { content: '\f53f'; color: var(--c-art); }
        .theme-art .ec-year { color: #e9d5ff; } .theme-art .ec-tag { background: rgba(192,132,252,0.2); color: #e9d5ff; border: 1px solid rgba(192,132,252,0.3); }

        .theme-dis { border-left: 4px solid var(--c-dis); }
        .theme-dis::before { content: '\f071'; color: var(--c-dis); }
        .theme-dis .ec-year { color: #fdba74; } .theme-dis .ec-tag { background: rgba(251,146,60,0.2); color: #fdba74; border: 1px solid rgba(251,146,60,0.3); }

        .theme-emp { border-left: 4px solid var(--c-emp); }
        .theme-emp::before { content: '\f521'; color: var(--c-emp); }
        .theme-emp .ec-year { color: #fde047; } .theme-emp .ec-tag { background: rgba(250,204,21,0.2); color: #fde047; border: 1px solid rgba(250,204,21,0.3); }

        .theme-gen { border-left: 4px solid var(--text-muted); }
        .theme-gen::before { content: '\f0ac'; color: var(--text-muted); }
        .theme-gen .ec-tag { background: rgba(148,163,184,0.2); color: #e2e8f0; border: 1px solid rgba(148,163,184,0.3); }

        /* Tatil Uyarısı & Inputlar */
        .holiday-alert { padding: 15px; margin-bottom: 20px; border-radius: 16px; display: flex; align-items: center; gap: 15px; font-weight: 700; font-size: 0.95rem; animation: fadeIn 0.5s; }
        .ha-off { background: linear-gradient(90deg, rgba(239,68,68,0.15), rgba(239,68,68,0.05)); color: #fca5a5; border-left: 4px solid var(--c-war); border: 1px solid rgba(239,68,68,0.2); }
        .ha-rel { background: linear-gradient(90deg, rgba(168,85,247,0.15), rgba(168,85,247,0.05)); color: #e9d5ff; border-left: 4px solid #a855f7; border: 1px solid rgba(168,85,247,0.2); }
        
        .date-picker { display: none; gap: 5px; margin-bottom: 15px; justify-content: center; }
        .date-picker.active { display: flex; animation: fadeIn 0.3s; }
        .dp-input { background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; padding: 8px; border-radius: 8px; text-align: center; font-family: 'Nunito', sans-serif; font-weight: 600; outline: none; }
        .dp-input:focus { border-color: var(--accent); }
        .dp-btn { background: var(--accent); border: none; padding: 8px 15px; border-radius: 8px; font-weight: 800; cursor: pointer; color: #000; font-family: 'Nunito', sans-serif; transition: 0.2s; }
        .dp-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4); }

        /* =========================================================
           ÖNİZLEME MODALI & YENİ RENK SEÇİCİ PALET
           ========================================================= */
        #previewModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            display: none; justify-content: center; align-items: center; z-index: 9998; padding: 20px;
        }
        .modal-content {
            background: var(--bg-dark); border: 1px solid rgba(255,255,255,0.15);
            border-radius: 28px; padding: 25px; width: 100%; max-width: 440px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); position: relative;
            max-height: 95vh; overflow-y: auto;
        }
        .close-modal {
            position: absolute; top: 15px; right: 15px; background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1); color: white; width: 34px; height: 34px; border-radius: 50%;
            cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; z-index: 10; font-family: 'Nunito', sans-serif; transition: 0.2s;
        }
        .close-modal:hover { background: rgba(255,255,255,0.2); transform: rotate(90deg); }
        
        .preview-box {
            width: 100%; background: #0b1120; border-radius: 20px; 
            overflow: hidden; position: relative; margin-bottom: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transition: height 0.3s ease, background-color 0.3s ease; 
            border: 1px solid rgba(255,255,255,0.05);
        }
        
        #previewCloneWrapper {
            position: absolute; top: 0; left: 0; 
            width: 1080px; min-height: 1080px; height: max-content; 
            transform-origin: top left; pointer-events: none;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 80px 90px; box-sizing: border-box;
        }

        /* Yeni Renk Paleti Tasarımı */
        .color-picker-container {
            display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 20px;
        }
        .color-picker-title {
            font-size: 1rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px;
        }
        .color-swatches {
            display: flex; flex-wrap: wrap; justify-content: center; gap: 12px;
        }
        .color-swatch {
            width: 42px; height: 42px; border-radius: 50%; cursor: pointer;
            border: 3px solid transparent; transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .color-swatch:hover { transform: scale(1.1); }
        .color-swatch.active { border-color: white; transform: scale(1.1); box-shadow: 0 0 15px rgba(255,255,255,0.4); }

        /* =========================================================
           GİZLİ PAYLAŞIM KARTI (POSTER) - SAYDAM KUTU FIX (KÖŞELER)
           ========================================================= */
        #exportCanvasArea {
            position: fixed; top: -9999px; left: -9999px; 
            width: 1080px; min-height: 1080px; height: max-content; 
            background-color: #0b1120; 
            display: flex; flex-direction: column; justify-content: flex-start; align-items: center;
            padding: 100px 90px 80px 90px; box-sizing: border-box; z-index: -1;
            font-family: 'Nunito', sans-serif; color: white;
            background-image: radial-gradient(rgba(255, 255, 255, 0.05) 2px, transparent 2px);
            background-size: 35px 35px;
        }

        /* Logo Sol Üstte */
        .export-logo-top-left {
            position: absolute; top: 60px; left: 60px; width: 120px; height: 120px;
            object-fit: cover; border-radius: 28px; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            z-index: 10;
        }
        
        .export-header { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-bottom: 40px; width: 100%; z-index: 2;}
        
        .export-date { 
            font-size: 1.8rem; font-weight: 700; color: #cbd5e1; 
            text-transform: uppercase; letter-spacing: 12px;
        }

        .export-top-title { 
            font-family: 'Nunito', sans-serif; 
            font-size: 4rem; 
            color: #ffffff; 
            font-weight: 900; 
            letter-spacing: 16px; 
            text-shadow: 0 8px 25px rgba(255,255,255,0.2), 0 5px 15px rgba(0,0,0,0.8); 
            z-index: 2;
        }

        #exportCardsContainer { width: 100%; display: flex; flex-direction: column; z-index: 2;}

        /* HATA FIX: Kenarlık/Saydam Kutu çözümü için sağlamlaştırıldı */
        .export-card {
            border-radius: 32px; 
            width: 100%; position: relative;
            display: flex; flex-direction: column; overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08); /* İç gölge yerine ince güvenli kenarlık kondu */
            box-shadow: 0 25px 50px rgba(0,0,0,0.5); 
            background-color: #0f172a; /* Saydamlık yırtılmalarına karşı sağlam arka plan konuldu */
        }
        
        /* Kenar rengi için border yerine içeride element kullanıldı */
        .exp-strip {
            position: absolute; top: 0; left: 0; bottom: 0; width: 16px; z-index: 1;
        }

        /* Gradyanlar saydamlık bırakmayacak (rgba... -> %100 tam rgb geçişi) şekilde uyarlandı */
        .exp-theme-war { background-image: linear-gradient(145deg, rgba(185,28,28,0.4) 0%, rgba(15,23,42,1) 60%); }
        .exp-theme-war .exp-strip { background-color: var(--c-war); }
        
        .exp-theme-sci { background-image: linear-gradient(145deg, rgba(6,78,59,0.4) 0%, rgba(15,23,42,1) 60%); }
        .exp-theme-sci .exp-strip { background-color: var(--c-sci); }
        
        .exp-theme-lit { background-image: linear-gradient(145deg, rgba(131,24,67,0.4) 0%, rgba(15,23,42,1) 60%); }
        .exp-theme-lit .exp-strip { background-color: var(--c-lit); }
        
        .exp-theme-art { background-image: linear-gradient(145deg, rgba(88,28,135,0.4) 0%, rgba(15,23,42,1) 60%); }
        .exp-theme-art .exp-strip { background-color: var(--c-art); }
        
        .exp-theme-dis { background-image: linear-gradient(145deg, rgba(154,52,18,0.4) 0%, rgba(15,23,42,1) 60%); }
        .exp-theme-dis .exp-strip { background-color: var(--c-dis); }
        
        .exp-theme-emp { background-image: linear-gradient(145deg, rgba(133,77,14,0.4) 0%, rgba(15,23,42,1) 60%); }
        .exp-theme-emp .exp-strip { background-color: var(--c-emp); }
        
        .exp-theme-gen { background-image: linear-gradient(145deg, rgba(51,65,85,0.4) 0%, rgba(15,23,42,1) 60%); }
        .exp-theme-gen .exp-strip { background-color: var(--text-muted); }

        .exp-quote-icon { position: absolute; opacity: 0.08; pointer-events: none; color: #ffffff !important; transform: rotate(-10deg); }
        .export-meta { display: flex; align-items: center; position: relative; z-index: 2; border-bottom: 2px solid rgba(255,255,255,0.1); }
        .export-year { font-family: 'Nunito', sans-serif; font-weight: 900; color: #ffffff; line-height: 1; text-shadow: 0 10px 30px rgba(0,0,0,0.6); }
        .export-tag { border-radius: 16px; font-weight: 900; letter-spacing: 3px; text-transform: uppercase; color: #111827; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .export-text { line-height: 1.5; color: #f8fafc; font-weight: 600; position: relative; z-index: 2; text-shadow: 0 5px 15px rgba(0,0,0,0.5); }

        /* Uygulama Adı En Altta */
        .export-footer-name {
            margin-top: auto; padding-top: 60px;
            font-family: 'Nunito', sans-serif; font-size: 3.8rem; font-weight: 900; 
            color: #ffffff; letter-spacing: 10px; text-transform: uppercase;
            text-shadow: 0 10px 20px rgba(0,0,0,0.5); text-align: center; z-index: 2;
        }

<script>
    const mNames = ['Ocak', 'Şubat', 'Mart', 'Nisan', 'Mayıs', 'Haziran', 'Temmuz', 'Ağustos', 'Eylül', 'Ekim', 'Kasım', 'Aralık'];
    const dNames = ['Pazar', 'Pazartesi', 'Salı', 'Çarşamba', 'Perşembe', 'Cuma', 'Cumartesi'];
    
    const quotes = [
        "Geçmişi hatırlamayanlar, onu bir kere daha yaşamak zorunda kalırlar.",
        "Tarih, sadece geçmiş değil, aynı zamanda geleceğin haritasıdır.",
        "Bugünü anlamak için, dünün sayfalarını karıştırmak gerekir.",
        "Zaman sessiz bir testeredir.",
        "Bilgi birikimi, insanlığın en büyük mirasıdır.",
        "Her yeni gün, tarihe düşülmüş taze bir nottur.",
        "Geçmişin yankıları, bugünün kararlarında gizlidir."
    ];

    const keywords = {
        war: ['savaş', 'muharebe', 'sefer', 'kuşatma', 'cephe', 'taarruz', 'işgal', 'fetih', 'ordu', 'çatışma'],
        disaster: ['yangın', 'deprem', 'sel', 'kaza', 'patlama', 'felaket', 'salgın', 'vefat', 'öldü', 'suikast'],
        treaty: ['antlaşma', 'anlaşma', 'barış', 'imza', 'mütareke'],
        science: ['icat', 'keşif', 'bilim', 'uzay', 'teknoloji', 'kuruldu', 'ilk kez', 'nobel', 'patent'],
        literature: ['kitap', 'roman', 'şiir', 'şair', 'yazar', 'edebiyat', 'dergi', 'yayınlandı', 'yazıldı'],
        art: ['film', 'sanat', 'müze', 'ressam', 'eser', 'heykel', 'müzik', 'konser', 'sergi'],
        empire: ['imparator', 'padişah', 'sultan', 'kral', 'cumhuriyet', 'devlet', 'başkan', 'kuruluş']
    };

    const fixedHolidays = {
        '01-01': { n: 'Yılbaşı', t: 'official' }, '04-23': { n: 'Ulusal Egemenlik ve Çocuk Byr.', t: 'official' },
        '05-01': { n: 'Emek ve Dayanışma Günü', t: 'official' }, '05-19': { n: 'Atatürk\'ü Anma, Gençlik ve Spor Byr.', t: 'official' },
        '07-15': { n: 'Demokrasi ve Milli Birlik', t: 'official' }, '08-30': { n: 'Zafer Bayramı', t: 'official' },
        '10-29': { n: 'Cumhuriyet Bayramı', t: 'official' }
    };
    const variableHolidays2026 = {
        '2026-03-20': { n: 'Ramazan 1. Gün', t: 'religious' }, '2026-03-21': { n: 'Ramazan 2. Gün', t: 'religious' },
        '2026-03-22': { n: 'Ramazan 3. Gün', t: 'religious' }, '2026-05-27': { n: 'Kurban 1. Gün', t: 'religious' },
        '2026-05-28': { n: 'Kurban 2. Gün', t: 'religious' }, '2026-05-29': { n: 'Kurban 3. Gün', t: 'religious' },
        '2026-05-30': { n: 'Kurban 4. Gün', t: 'religious' }
    };

    const offlineDB = {
        '01-21': [
            {y:1774, t:'Osmanlı Padişahı III. Mustafa vefat etti, I. Abdülhamid tahta çıktı.', c:'empire'},
            {y:1950, t:'İngiliz yazar George Orwell vefat etti.', c:'literature'},
            {y:2024, t:'Alper Gezeravcı uzaya gitti.', c:'science'},
            {y:1924, t:'Vladimir Lenin vefat etti.', c:'disaster'}
        ],
        '01-22': [
            {y:1517, t:'Yavuz Sultan Selim Ridaniye Zaferi\'ni kazandı.', c:'war'},
            {y:1788, t:'Lord Byron doğdu.', c:'literature'},
            {y:1984, t:'Apple Macintosh tanıtıldı.', c:'science'}
        ],
        '01-24': [{y:1993, t:'Gazeteci yazar Uğur Mumcu suikaste uğradı.', c:'disaster'}],
        '04-23': [{y:1920, t:'TBMM açıldı.', c:'empire'}],
        '05-29': [{y:1453, t:'İstanbul Fethedildi.', c:'war'}],
        '08-30': [{y:1922, t:'Büyük Taarruz Zaferi.', c:'war'}],
        '10-29': [{y:1923, t:'Türkiye Cumhuriyeti ilan edildi.', c:'empire'}]
    };

    const genFacts = ["Tarihçiler bu günü, sessiz ama önemli bir geçiş günü olarak not eder.", "Geçmişte bugün, insanlık tarihi için yeni bir sayfa açıldı."];

    let cY = 2026, cM = 0;
    let currentEvents = []; 
    let currentFilteredEvents = []; 
    let activeFilter = 'all'; 
    let currentDownloadYear = '';
    let isSelectionMode = false; 
    let currentExportBgColor = '#0b1120'; 
    const today = new Date();

    function init() {
        if(today.getFullYear() === 2026) { cY=2026; cM=today.getMonth(); }
        renderCal(); 
        setTimeout(() => selDay(today.getDate()), 50);
    }

    function renderCal() {
        document.getElementById('monthTxt').innerText = `${mNames[cM]} ${cY}`;
        const gr = document.getElementById('calGrid'); gr.innerHTML = '';
        const f = new Date(cY, cM, 1);
        const l = new Date(cY, cM+1, 0);
        const start = (f.getDay() + 6) % 7;

        for(let i=0; i<start; i++) gr.innerHTML += `<div class="day" style="opacity:0.3; pointer-events:none"></div>`;

        for(let d=1; d<=l.getDate(); d++) {
            const el = document.createElement('div');
            el.className = 'day';
            el.innerText = d;
            
            const sk = `${String(cM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            const lk = `${cY}-${String(cM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
            let hType = fixedHolidays[sk]?.t || variableHolidays2026[lk]?.t;
            
            if(hType) el.innerHTML += `<div class="dots"><div class="dot ${hType === 'official' ? 'official' : 'religious'}"></div></div>`;
            if(d === today.getDate() && cM === today.getMonth() && cY === today.getFullYear()) el.classList.add('today');

            el.onclick = () => {
                document.querySelectorAll('.day').forEach(x => x.classList.remove('selected'));
                el.classList.add('selected');
                selDay(d);
            }
            gr.appendChild(el);
        }
    }

    async function selDay(d) {
        cancelSelectionMode(); 

        const dateObj = new Date(cY, cM, d);
        const sk = `${String(cM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const lk = `${cY}-${String(cM+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;

        document.getElementById('dNum').innerText = d;
        document.getElementById('dFull').innerText = `${d} ${mNames[cM].toUpperCase()} ${cY}, ${dNames[dateObj.getDay()].toUpperCase()}`;
        
        const dayOfYear = Math.floor((dateObj - new Date(dateObj.getFullYear(), 0, 0)) / 1000 / 60 / 60 / 24);
        document.getElementById('dailyQuote').innerText = quotes[dayOfYear % quotes.length];

        const now = new Date(); now.setHours(0,0,0,0);
        const target = new Date(cY, cM, d); target.setHours(0,0,0,0);
        const diff = Math.ceil((target - now) / (1000 * 60 * 60 * 24));
        const countBox = document.getElementById('countDisplay');
        const countText = document.getElementById('countText');
        
        if(diff === 0) { countBox.style.display = 'none'; }
        else { countBox.style.display = 'inline-flex'; countText.innerText = diff > 0 ? `${diff} Gün Kaldı` : `${Math.abs(diff)} Gün Geçti`; }

        const hijri = getHijriDate(dateObj); document.getElementById('hijriText').innerText = `${hijri.d} ${hijri.m} ${hijri.y}`;
        const moon = getMoonPhase(cY, cM+1, d); document.getElementById('moonText').innerText = moon.name; document.getElementById('moonIcon').className = moon.icon;
        const season = getSeason(cM, d); document.getElementById('seasonText').innerText = season.name; document.getElementById('seasonIcon').className = season.icon;

        const ha = document.getElementById('holidayArea');
        let hInfo = fixedHolidays[sk] || variableHolidays2026[lk];
        if(hInfo) {
            let cls = hInfo.t === 'official' ? 'ha-off' : 'ha-rel';
            ha.innerHTML = `<div class="holiday-alert ${cls}"><i class="fas fa-flag" style="font-size:1.5rem"></i> <div>${hInfo.n}</div></div>`;
        } else ha.innerHTML = '';

        const list = document.getElementById('historyList');
        list.innerHTML = '<div style="text-align:center; opacity:0.6; padding:30px; font-weight:700;"><i class="fas fa-circle-notch fa-spin" style="font-size:2rem; margin-bottom:10px; color:var(--accent); display:block;"></i> Arşiv taranıyor...</div>';
        
        let events = offlineDB[sk] ? [...offlineDB[sk]] : [];

        try {
            const controller = new AbortController(); setTimeout(() => controller.abort(), 1200);
            const res = await fetch(`https://tr.wikipedia.org/api/rest_v1/feed/onthisday/events/${cM+1}/${d}`, { signal: controller.signal });
            if(res.ok) {
                const data = await res.json();
                data.events.forEach(item => {
                    const txt = item.text.toLowerCase();
                    let category = 'general'; let isRelevant = false;
                    for (const [cat, words] of Object.entries(keywords)) {
                        if (words.some(w => txt.includes(w))) { category = cat; isRelevant = true; break; }
                    }
                    if(isRelevant && !events.some(e => e.y == item.year)) events.push({ y: item.year, t: item.text, c: category });
                });
            }
        } catch(err) {}

        if(events.length === 0) events.push({ y: 'BİLGİ', t: genFacts[d % genFacts.length], c: 'general' });
        events.sort((a,b) => { if(a.y === 'BİLGİ') return 1; if(b.y === 'BİLGİ') return -1; return a.y - b.y; });
        currentEvents = events;
        
        renderEventsDOM();
    }

    function renderEventsDOM() {
        const list = document.getElementById('historyList');
        let html = '';
        
        let filtered = currentEvents;
        if(activeFilter !== 'all') {
            filtered = currentEvents.filter(e => e.c === activeFilter);
        }
        currentFilteredEvents = filtered;

        if(filtered.length === 0) {
            list.innerHTML = '<div style="text-align:center; opacity:0.6; padding:30px; font-weight:600;">Bu kategoride olay bulunamadı.</div>';
            return;
        }

        filtered.forEach((e, index) => {
            let tagLabel = 'Olay', theme = 'theme-gen', colorHex = '#94a3b8';
            if(e.c === 'war') { tagLabel = 'SAVAŞ'; theme = 'theme-war'; colorHex = '#f87171'; }
            else if(e.c === 'science') { tagLabel = 'BİLİM'; theme = 'theme-sci'; colorHex = '#34d399'; }
            else if(e.c === 'literature') { tagLabel = 'EDEBİYAT'; theme = 'theme-lit'; colorHex = '#f472b6'; }
            else if(e.c === 'art') { tagLabel = 'SANAT'; theme = 'theme-art'; colorHex = '#c084fc'; }
            else if(e.c === 'disaster') { tagLabel = 'AFET/OLAY'; theme = 'theme-dis'; colorHex = '#fb923c'; }
            else if(e.c === 'empire') { tagLabel = 'DEVLET'; theme = 'theme-emp'; colorHex = '#facc15'; }

            let safeText = e.t.replace(/'/g, "\\'").replace(/"/g, "&quot;");
            let delay = index * 0.08; 

            html += `
                <div class="event-card ${theme}" style="animation-delay: ${delay}s">
                    <div class="ec-header">
                        <div class="ec-title-group">
                            <input type="checkbox" class="custom-checkbox event-select-cb" data-idx="${index}" title="Afişe ekle">
                            <span class="ec-year">${e.y}</span>
                            <span class="ec-tag">${tagLabel}</span>
                        </div>
                        <button class="share-btn" onclick="openPreviewSingle('${e.y}', '${safeText}', '${tagLabel}', '${colorHex}', '${e.c}')" title="Sadece Bu Olayı Paylaş">
                            <i class="fas fa-share-nodes"></i>
                        </button>
                    </div>
                    <div class="ec-text">${e.t}</div>
                </div>`;
        });
        list.innerHTML = html;
    }

    function filterEvents(cat) {
        cancelSelectionMode();
        activeFilter = cat;
        document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');
        renderEventsDOM();
    }

    function toggleSelectionMode() {
        const list = document.getElementById('historyList');
        const btn = document.getElementById('multiDownloadBtn');
        const cancelBtn = document.getElementById('cancelSelectionBtn');

        if (!isSelectionMode) {
            isSelectionMode = true;
            list.classList.add('selection-mode');
            btn.innerHTML = '<i class="fas fa-download"></i> Afişi İndir';
            btn.style.background = 'rgba(52, 211, 153, 0.15)'; 
            btn.style.borderColor = 'rgba(52, 211, 153, 0.3)';
            btn.style.color = '#34d399';
            cancelBtn.style.display = 'inline-block';
        } else {
            shareSelectedEvents();
        }
    }

    function cancelSelectionMode() {
        if(!isSelectionMode) return;
        isSelectionMode = false;
        
        const list = document.getElementById('historyList');
        const btn = document.getElementById('multiDownloadBtn');
        const cancelBtn = document.getElementById('cancelSelectionBtn');

        list.classList.remove('selection-mode');
        btn.innerHTML = '<i class="fas fa-check-square"></i> Seç & İndir';
        btn.style.background = 'rgba(56, 189, 248, 0.15)';
        btn.style.borderColor = 'rgba(56, 189, 248, 0.3)';
        btn.style.color = 'var(--accent)';
        cancelBtn.style.display = 'none';

        document.querySelectorAll('.custom-checkbox').forEach(cb => cb.checked = false);
    }

    function selectColor(element, colorHex) {
        document.querySelectorAll('.color-swatch').forEach(sw => sw.classList.remove('active'));
        element.classList.add('active');
        
        currentExportBgColor = colorHex;
        document.getElementById('exportCanvasArea').style.backgroundColor = currentExportBgColor;
        document.getElementById('previewBox').style.backgroundColor = currentExportBgColor;
    }

    function openPreviewSingle(year, text, tag, color, category) {
        openPreviewModal([{ y: year, t: text, tagLabel: tag, colorHex: color, c: category }]);
    }

    function shareSelectedEvents() {
        const checkboxes = document.querySelectorAll('.event-select-cb:checked');
        if (checkboxes.length === 0) {
            alert("Lütfen afişe eklemek istediğiniz olayları, yanlarındaki kutucukları işaretleyerek seçin.");
            return;
        }
        
        let eventsToShare = [];
        checkboxes.forEach(cb => {
            let idx = cb.getAttribute('data-idx');
            let e = currentFilteredEvents[idx];
            
            let tagLabel = 'Olay', colorHex = '#94a3b8';
            if(e.c === 'war') { tagLabel = 'SAVAŞ'; colorHex = '#f87171'; }
            else if(e.c === 'science') { tagLabel = 'BİLİM'; colorHex = '#34d399'; }
            else if(e.c === 'literature') { tagLabel = 'EDEBİYAT'; colorHex = '#f472b6'; }
            else if(e.c === 'art') { tagLabel = 'SANAT'; colorHex = '#c084fc'; }
            else if(e.c === 'disaster') { tagLabel = 'AFET/OLAY'; colorHex = '#fb923c'; }
            else if(e.c === 'empire') { tagLabel = 'DEVLET'; colorHex = '#facc15'; }
            
            eventsToShare.push({ y: e.y, t: e.t, tagLabel, colorHex, c: e.c });
        });

        openPreviewModal(eventsToShare);
    }

    function openPreviewModal(eventsArray) {
        currentDownloadYear = eventsArray.length === 1 ? eventsArray[0].y : 'Toplu';

        const exportCanvas = document.getElementById('exportCanvasArea');
        exportCanvas.querySelector('#expDate').innerText = document.getElementById('dFull').innerText;

        const container = document.getElementById('exportCardsContainer');
        container.innerHTML = ''; 

        let count = eventsArray.length;
        if(count > 6) { count = 6; alert("En fazla 6 olay eklenebilir, ilk 6 olay afişe eklendi."); }
        const displayEvents = eventsArray.slice(0, 6);

        let pad = count === 1 ? '80px 70px' : count === 2 ? '55px 60px' : count === 3 ? '40px 50px' : '30px 40px';
        let ySize = count === 1 ? '8.5rem' : count === 2 ? '6rem' : count === 3 ? '4.5rem' : '3.8rem';
        let tSize = count === 1 ? '3.4rem' : count === 2 ? '2.5rem' : count === 3 ? '2.1rem' : '1.7rem';
        let tagSize = count === 1 ? '1.8rem' : count === 2 ? '1.4rem' : count === 3 ? '1.2rem' : '1.1rem';
        let iSize = count === 1 ? '8rem' : count === 2 ? '5.5rem' : count === 3 ? '4rem' : '3rem';
        let gap = count === 1 ? '35px' : count === 2 ? '25px' : count === 3 ? '20px' : '15px';
        let gapBetween = count === 1 ? '0px' : '20px';

        displayEvents.forEach(ev => {
            let themeClass = 'exp-theme-gen';
            if(ev.c === 'war') themeClass = 'exp-theme-war';
            else if(ev.c === 'science') themeClass = 'exp-theme-sci';
            else if(ev.c === 'literature') themeClass = 'exp-theme-lit';
            else if(ev.c === 'art') themeClass = 'exp-theme-art';
            else if(ev.c === 'disaster') themeClass = 'exp-theme-dis';
            else if(ev.c === 'empire') themeClass = 'exp-theme-emp';

            let cardHTML = `
                <div class="export-card ${themeClass}" style="padding: ${pad}; margin-bottom: ${gapBetween};">
                    <div class="exp-strip"></div>
                    <i class="fas fa-quote-right exp-quote-icon" style="font-size: ${iSize}; top: ${count<3?'40px':'20px'}; right: ${count<3?'40px':'20px'};"></i>
                    <div class="export-meta" style="margin-bottom: ${gap}; padding-bottom: ${gap}; gap: ${gap};">
                        <div class="export-year" style="font-size: ${ySize};">${ev.y}</div>
                        <div class="export-tag" style="font-size: ${tagSize}; background-color: ${ev.colorHex}; padding: ${count<3?'12px 28px':'8px 20px'};">${ev.tagLabel}</div>
                    </div>
                    <div class="export-text" style="font-size: ${tSize};">${ev.t}</div>
                </div>
            `;
            container.innerHTML += cardHTML;
        });

        // Seçili rengi uygula
        exportCanvas.style.backgroundColor = currentExportBgColor;
        document.getElementById('previewBox').style.backgroundColor = currentExportBgColor;

        const cloneWrapper = document.getElementById('previewCloneWrapper');
        cloneWrapper.innerHTML = ''; 
        cloneWrapper.innerHTML = exportCanvas.innerHTML; 

        document.getElementById('previewModal').style.display = 'flex';

        setTimeout(() => {
            const previewBox = document.getElementById('previewBox');
            const previewBoxWidth = previewBox.offsetWidth;
            const scaleRatio = previewBoxWidth / 1080; 
            
            cloneWrapper.style.transform = `scale(${scaleRatio})`;
            
            const actualHeight = exportCanvas.offsetHeight;
            previewBox.style.height = `${actualHeight * scaleRatio}px`;

        }, 20);
    }

    function closePreview() {
        document.getElementById('previewModal').style.display = 'none';
        document.getElementById('previewCloneWrapper').innerHTML = ''; 
    }

    async function downloadCard() {
        const overlay = document.getElementById('loadingOverlay');
        overlay.style.display = 'flex'; 

        const targetDiv = document.getElementById('exportCanvasArea');
        
        try {
            const exportWidth = targetDiv.offsetWidth;
            const exportHeight = targetDiv.offsetHeight;

            const canvas = await html2canvas(targetDiv, {
                scale: 2, 
                width: exportWidth,
                height: exportHeight,
                useCORS: true,
                backgroundColor: currentExportBgColor
            });

            const imageURL = canvas.toDataURL("image/png");

            const link = document.createElement('a');
            link.download = `MuGol_TarihteBugun_${currentDownloadYear}.png`;
            link.href = imageURL;
            link.click();
            
            closePreview(); 
            cancelSelectionMode(); 

        } catch (error) {
            alert("Kart oluşturulurken bir hata oluştu.");
            console.error(error);
        } finally {
            overlay.style.display = 'none'; 
        }
    }

    /* -- YARDIMCI FONKSİYONLAR -- */
    function getHijriDate(date) {
        const day = date.getDate(); const month = date.getMonth(); const year = date.getFullYear();
        let m = month + 1; let y = year; if (m < 3) { y -= 1; m += 12; }
        let a = Math.floor(y / 100); let b = 2 - a + Math.floor(a / 4); if (y < 1583) b = 0;
        let jd = Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + day + b - 1524;
        let z = jd - 1948440 + 10632; let n = Math.floor((z - 1) / 10631); z = z - 10631 * n + 354;
        let j = (Math.floor((10985 - z) / 5316)) * (Math.floor((50 * z) / 17719)) + (Math.floor(z / 5670)) * (Math.floor((43 * z) / 15238));
        z = z - (Math.floor((30 - j) / 15)) * (Math.floor((17719 * j) / 50)) - (Math.floor(j / 16)) * (Math.floor((15238 * j) / 43)) + 29;
        let mH = Math.floor(24 * z / 709); let dH = z - Math.floor(709 * mH / 24); let yH = 30 * n + j - 30;
        const hM = ["Muharrem", "Safer", "Rebiülevvel", "Rebiülahir", "Cemaziyelevvel", "Cemaziyelahir", "Recep", "Şaban", "Ramazan", "Şevval", "Zilkade", "Zilhicce"];
        return { d: dH, m: hM[mH - 1], y: yH };
    }

    function getSeason(m, d) {
        if (m < 2 || (m === 2 && d < 21)) return {name:'Kış', icon:'fas fa-snowflake'};
        if (m < 5 || (m === 5 && d < 21)) return {name:'İlkbahar', icon:'fas fa-seedling'};
        if (m < 8 || (m === 8 && d < 22)) return {name:'Yaz', icon:'fas fa-sun'};
        if (m < 11 || (m === 11 && d < 21)) return {name:'Sonbahar', icon:'fab fa-canadian-maple-leaf'};
        return {name:'Kış', icon:'fas fa-snowflake'};
    }

    function getMoonPhase(year, month, day) {
        let r = year % 100; r %= 19; if (r > 9) { r -= 19; }
        r = ((r * 11) % 30) + parseInt(month) + parseInt(day);
        if (month < 3) { r += 2; } r -= ((year < 2000) ? 4 : 8.3);
        r = Math.floor(r + 0.5) % 30; let res = (r < 0) ? r + 30 : r;
        if(res < 2) return {name:'Yeni Ay', icon:'fas fa-circle'};
        if(res < 7) return {name:'Hilal', icon:'fas fa-moon'};
        if(res < 10) return {name:'İlk Dördün', icon:'fas fa-adjust'};
        if(res < 16) return {name:'Dolunay', icon:'far fa-circle'};
        if(res < 24) return {name:'Son Dördün', icon:'fas fa-adjust'};
        return {name:'Hilal', icon:'fas fa-moon'};
    }

    function changeDate(dir) { cM += dir; if(cM > 11) { cM = 0; cY++; } if(cM < 0) { cM = 11; cY--; } renderCal(); selDay(1); }
    function resetToday() { if(today.getFullYear() === 2026) { cY=2026; cM=today.getMonth(); } renderCal(); setTimeout(() => document.querySelector('.day.today')?.click(), 50); }
    function togglePicker() { document.getElementById('datePicker').classList.toggle('active'); }
    function applyJump() { const y = parseInt(document.getElementById('jumpYear').value); if(y) { cY = y; cM = parseInt(document.getElementById('jumpMonth').value); renderCal(); selDay(1); togglePicker(); } }
    function copyContent() { if(!currentEvents.length) return; let txt = `📅 MuGöl Takvim (${document.getElementById('dFull').innerText})\n\n`; currentEvents.forEach(e => txt += `• ${e.y}: ${e.t}\n`); navigator.clipboard.writeText(txt).then(() => alert("Tüm liste kopyalandı!")); }

    init();
</script>
